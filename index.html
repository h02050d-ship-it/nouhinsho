<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>納品書作成</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root {
  --blue: #1565c0;
  --blue-light: #e3f2fd;
  --red: #c62828;
  --green: #2e7d32;
  --orange: #e65100;
  --gray: #78909c;
  --bg: #f5f5f5;
  --white: #fff;
  --shadow: 0 2px 8px rgba(0,0,0,.12);
  --radius: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif; background: var(--bg); color: #333; }

/* === Header === */
.header {
  background: var(--blue);
  color: #fff;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header h1 { font-size: 18px; font-weight: 700; }
.header-links a { color: #fff; text-decoration: none; font-size: 13px; opacity: .8; margin-left: 12px; }
.header-links a:hover { opacity: 1; }

/* === Steps === */
.steps {
  display: flex;
  justify-content: center;
  gap: 0;
  padding: 16px 20px 8px;
  background: var(--white);
  border-bottom: 1px solid #e0e0e0;
}
.step-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: #999;
  cursor: pointer;
}
.step-item.active { color: var(--blue); font-weight: 700; }
.step-item.done { color: var(--green); }
.step-num {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700;
  background: #e0e0e0; color: #999;
}
.step-item.active .step-num { background: var(--blue); color: #fff; }
.step-item.done .step-num { background: var(--green); color: #fff; }
.step-arrow { color: #ccc; margin: 0 8px; font-size: 18px; }

/* === Container === */
.container { max-width: 960px; margin: 0 auto; padding: 16px; }

/* === Step 1: Customer Selection === */
.date-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.date-row label { font-weight: 600; font-size: 14px; }
.date-row input[type="date"] { font-size: 16px; padding: 6px 10px; border: 1px solid #ccc; border-radius: var(--radius); }

.search-box {
  width: 100%;
  padding: 10px 14px;
  font-size: 16px;
  border: 2px solid #e0e0e0;
  border-radius: var(--radius);
  margin-bottom: 12px;
  outline: none;
}
.search-box:focus { border-color: var(--blue); }

.section-label {
  font-size: 13px; font-weight: 700; color: var(--gray);
  margin: 12px 0 8px;
  text-transform: uppercase;
}

.customer-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; }
.customer-card {
  background: var(--white);
  border: 2px solid #e0e0e0;
  border-radius: var(--radius);
  padding: 12px 14px;
  cursor: pointer;
  transition: border-color .15s, box-shadow .15s;
}
.customer-card:hover { border-color: var(--blue); box-shadow: var(--shadow); }
.customer-card.priority { border-left: 4px solid var(--red); }
.customer-name { font-size: 15px; font-weight: 700; }
.customer-method { font-size: 12px; color: var(--gray); margin-top: 2px; }
.customer-badge {
  display: inline-block;
  background: var(--red);
  color: #fff;
  font-size: 11px;
  padding: 1px 7px;
  border-radius: 10px;
  margin-left: 6px;
  font-weight: 700;
}

/* === Step 2: Items === */
.step2-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
.step2-header h2 { font-size: 18px; }
.back-btn, .action-btn {
  padding: 8px 18px;
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  cursor: pointer;
  font-weight: 600;
}
.back-btn { background: #e0e0e0; color: #333; }
.action-btn { background: var(--blue); color: #fff; }
.action-btn:hover { opacity: .9; }
.action-btn:disabled { background: #bbb; cursor: not-allowed; }
.action-btn.green { background: var(--green); }
.action-btn.red { background: var(--red); }

.items-table-wrap { overflow-x: auto; margin-bottom: 12px; }
.items-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  background: var(--white);
  border-radius: var(--radius);
  overflow: hidden;
}
.items-table th {
  background: var(--blue);
  color: #fff;
  padding: 8px 6px;
  font-weight: 600;
  text-align: center;
  white-space: nowrap;
}
.items-table td {
  padding: 6px;
  border-bottom: 1px solid #eee;
  text-align: center;
  vertical-align: middle;
}
.items-table tr:hover { background: var(--blue-light); }
.items-table input[type="number"], .items-table input[type="text"], .items-table select {
  width: 100%;
  min-width: 60px;
  padding: 4px;
  border: 1px solid #ddd;
  border-radius: 4px;
  font-size: 13px;
  text-align: right;
}
.items-table .num { text-align: right; font-variant-numeric: tabular-nums; }

.extras-row {
  display: flex;
  gap: 16px;
  align-items: center;
  flex-wrap: wrap;
  margin: 12px 0;
  padding: 12px;
  background: var(--white);
  border-radius: var(--radius);
}
.extras-row label { font-size: 13px; font-weight: 600; }
.extras-row input, .extras-row select {
  padding: 6px 10px;
  border: 1px solid #ccc;
  border-radius: 4px;
  font-size: 14px;
}

.totals-box {
  background: var(--white);
  border-radius: var(--radius);
  padding: 16px;
  margin: 12px 0;
  font-size: 14px;
}
.totals-box .row { display: flex; justify-content: space-between; padding: 4px 0; }
.totals-box .row.grand { font-size: 18px; font-weight: 700; color: var(--blue); border-top: 2px solid var(--blue); padding-top: 8px; margin-top: 4px; }

/* === Step 3: Preview === */
.preview-actions {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}

.nouhinsho {
  background: #fff;
  width: 210mm;
  min-height: 297mm;
  margin: 0 auto;
  padding: 20mm 15mm;
  box-shadow: var(--shadow);
  font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;
  color: #000;
  position: relative;
}
.nouhinsho h2 { text-align: center; font-size: 28px; letter-spacing: 12px; margin-bottom: 16px; }
.nouhinsho .date-line { text-align: right; font-size: 14px; margin-bottom: 20px; }
.nouhinsho .customer-line {
  font-size: 18px;
  font-weight: 700;
  border-bottom: 1px solid #000;
  display: inline-block;
  min-width: 52%;
  padding: 4px 0 6px;
  margin-bottom: 20px;
}
.nouhinsho .customer-line .honorific { font-size: 14px; font-weight: 400; margin-left: 40px; }
.nouhinsho .total-box { display: inline-table; border-collapse: collapse; margin-bottom: 16px; }
.nouhinsho .total-box td { border: 1px solid #000; padding: 8px 20px; font-size: 18px; font-weight: 700; }
.nouhinsho .total-box .tl { font-size: 15px; background: #fff; min-width: 80px; }
.nouhinsho .total-box .tv { min-width: 140px; }

.nouhinsho table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  margin-bottom: 16px;
}
.nouhinsho table th, .nouhinsho table td {
  border: 1px solid #333;
  padding: 5px 6px;
  text-align: center;
}
.nouhinsho table th { background: #d9d9d9; font-weight: 700; color: #000; }
.nouhinsho table td.num { text-align: right; }
.nouhinsho table tbody tr:nth-child(odd) td { background: #f2f2f2; }
.nouhinsho table tbody tr:nth-child(even) td { background: #fff; }

.nouhinsho .summary-table { width: auto; margin-left: auto; }
.nouhinsho .summary-table td { border: 1px solid #333; padding: 4px 12px; }
.nouhinsho .summary-table .label { text-align: center; font-weight: 700; }
.nouhinsho .summary-table .value { text-align: right; min-width: 100px; }

.nouhinsho .company-name { font-size: 16px; font-weight: 700; }

/* === Loading === */
.loading {
  text-align: center;
  padding: 40px;
  color: var(--gray);
}
.spinner {
  display: inline-block;
  width: 30px; height: 30px;
  border: 3px solid #e0e0e0;
  border-top-color: var(--blue);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: #333;
  color: #fff;
  padding: 12px 24px;
  border-radius: var(--radius);
  font-size: 14px;
  z-index: 200;
  opacity: 0;
  transition: opacity .3s;
}
.toast.show { opacity: 1; }

.hidden { display: none !important; }

/* === Print === */
@media print {
  body { background: #fff; }
  .header, .steps, .preview-actions, .toast { display: none !important; }
  .container { max-width: none; padding: 0; margin: 0; }
  .nouhinsho {
    box-shadow: none;
    width: 100%;
    padding: 15mm;
    min-height: auto;
  }
  @page { size: A4 portrait; margin: 0; }
}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <h1>納品書作成</h1>
  <div class="header-links">
    <a href="https://h02050d-ship-it.github.io/kakou-yotei/" target="_blank">加工予定表 →</a>
  </div>
</div>

<!-- Steps -->
<div class="steps">
  <div class="step-item active" id="step-ind-1" onclick="goStep(1)">
    <div class="step-num">1</div>
    <span>取引先選択</span>
  </div>
  <span class="step-arrow">›</span>
  <div class="step-item" id="step-ind-2" onclick="goStep(2)">
    <div class="step-num">2</div>
    <span>商品選択</span>
  </div>
  <span class="step-arrow">›</span>
  <div class="step-item" id="step-ind-3" onclick="goStep(3)">
    <div class="step-num">3</div>
    <span>納品書出力</span>
  </div>
</div>

<!-- Content -->
<div class="container" id="app"></div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// =====================================================
// Config
// =====================================================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyE2O2zEk1NDYskaxflVtPReblSOyA5CyjfHTNXAYzK6tX1zgEzRypcFFSjtDy2SWa7wg/exec';
const HINMEI_MAP = { F: '桧フローリング', P: '桧羽目板', N: 'ナイスオリジナル', S: 'スノコ板' };
const GRADE_OPTIONS = ['丸節','小節','特上小','無節','丸節特上小','生節','B丸節'];
const TAX_RATE = 0.10;
const EXCLUDE_KEYWORDS = ['ヤフ','楽天','ネット'];

const firebaseConfig = {
  apiKey: "AIzaSyBkpsxdYciMiLmsBfHNWRL7OFniSsssQwA",
  authDomain: "kakou-yotei.firebaseapp.com",
  databaseURL: "https://kakou-yotei-default-rtdb.firebaseio.com",
  projectId: "kakou-yotei",
  storageBucket: "kakou-yotei.firebasestorage.app",
  messagingSenderId: "633993422136",
  appId: "1:633993422136:web:a8c9f47c35fead59840dcd"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// =====================================================
// State
// =====================================================
let state = {
  step: 1,
  date: new Date().toISOString().slice(0, 10),
  customers: [],
  kanryoItems: [],
  selectedCustomer: null,
  prices: [],
  priceCache: {},  // { '付売': [...], '市売': [...], 'ニッチ': [...] }
  items: [],
  carrier: '',
  unchin: 0,
  saved: false,
};

// =====================================================
// Data Loading
// =====================================================
async function loadCustomers() {
  try {
    const res = await fetch(GAS_URL + '?action=getCustomers');
    const data = await res.json();
    state.customers = data.customers || [];
  } catch (e) {
    console.error('Failed to load customers:', e);
    state.customers = [];
  }
}

async function loadAllPrices() {
  const methods = ['付売', '市売'];
  const promises = methods.map(async m => {
    try {
      const url = GAS_URL + '?action=getPrices&customer=ALL&method=' + encodeURIComponent(m);
      const res = await fetch(url);
      const data = await res.json();
      state.priceCache[m] = data.prices || [];
    } catch (e) { state.priceCache[m] = []; }
  });
  await Promise.all(promises);
}

function loadPricesFromCache(customer, method) {
  state.prices = state.priceCache[method] || [];
}

function loadKanryoItems() {
  return new Promise((resolve) => {
    db.ref('items').once('value', (snap) => {
      const val = snap.val() || {};
      const items = [];
      Object.entries(val).forEach(([key, item]) => {
        const ord = parseInt(item.order) || 0;
        if (ord >= 9 && item.archived !== '1') {
          items.push({ ...item, _key: key });
        }
      });
      state.kanryoItems = items;
      resolve();
    });
  });
}

async function saveRecords() {
  const checked = state.items.filter(it => it.checked);
  if (!checked.length) { showToast('商品を選択してください'); return; }

  const subtotal = checked.reduce((s, it) => s + calcKingaku(it), 0);
  const tax = Math.floor(subtotal * TAX_RATE);
  const total = subtotal + tax + (Number(state.unchin) || 0);

  const records = checked.map((it, idx) => ({
    date: state.date,
    customer: state.selectedCustomer.name,
    hinmei: it.hinmei,
    grade: it.grade,
    thickness: it.thickness,
    width: it.width,
    length: it.length,
    irikazu: it.irikazu,
    qty: it.qty,
    tanka: it.tanka,
    tanka_mod: it.tanka_mod || '',
    kingaku: calcKingaku(it),
    tax: idx === 0 ? tax : '',
    unchin: idx === 0 ? (Number(state.unchin) || 0) : '',
    nichi_unchin: '',
    total: idx === 0 ? total : '',
    method: state.selectedCustomer.method,
    carrier: idx === 0 ? state.carrier : ''
  }));

  try {
    const res = await fetch(GAS_URL + '?action=saveRecords', {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({ records })
    });
    const data = await res.json();
    if (data.success) {
      state.saved = true;
      showToast('データベースに ' + data.count + ' 件記録しました');
      render();
    } else {
      showToast('エラー: ' + (data.error || '不明'));
    }
  } catch (e) {
    showToast('保存に失敗しました: ' + e.message);
  }
}

// =====================================================
// Business Logic
// =====================================================
function lookupPrice(hinmei, grade, thickness, width, length) {
  const gradeKeyMap = {
    '丸節': 'marubushi',
    '小節': 'kobushi',
    '特上小': 'tokujoko',
    '無節': 'mubushi',
    '丸節特上小': 'marubushi_tokujoko',
    '生節': 'namabushi'
  };
  const gk = gradeKeyMap[grade];
  if (!gk) return '';

  for (const p of state.prices) {
    const pH = String(p.hinmei);
    const matchHinmei = pH.includes(hinmei) || hinmei.includes(pH) || pH === hinmei;
    if (matchHinmei &&
        Number(p.thickness) === Number(thickness) &&
        Number(p.width) === Number(width) &&
        Number(p.length) === Number(length)) {
      const v = p[gk];
      if (v !== '' && v !== 0 && v !== null && v !== undefined) return Number(v);
    }
  }
  // フォールバック: 厚・幅・長だけでマッチ
  for (const p of state.prices) {
    if (Number(p.thickness) === Number(thickness) &&
        Number(p.width) === Number(width) &&
        Number(p.length) === Number(length)) {
      const v = p[gk];
      if (v !== '' && v !== 0 && v !== null && v !== undefined) return Number(v);
    }
  }
  return '';
}

function calcKingaku(item) {
  const tanka = Number(item.tanka_mod) || Number(item.tanka) || 0;
  const qty = Number(item.qty) || 0;
  return tanka * qty;
}

function isExcluded(name) {
  return EXCLUDE_KEYWORDS.some(kw => name.includes(kw));
}

function getKanryoCustomers() {
  const map = {};
  state.kanryoItems.forEach(it => {
    const c = (it.customer || '').trim();
    if (!c || isExcluded(c)) return;
    if (!map[c]) map[c] = 0;
    map[c]++;
  });
  return map;
}

// =====================================================
// Navigation
// =====================================================
function goStep(n) {
  if (n === 2 && !state.selectedCustomer) return;
  if (n === 3 && !state.items.some(it => it.checked)) return;
  if (n === 3 && !state.carrier) { showToast('配送業者を選択してください'); return; }
  state.step = n;
  render();
  window.scrollTo(0, 0);
}

async function selectCustomer(cust) {
  state.selectedCustomer = cust;
  state.prices = [];
  state.saved = false;

  // Build items from kanryo immediately (no waiting)
  const kanryo = state.kanryoItems.filter(it =>
    matchCustomerName((it.customer || '').trim(), cust.name)
  );

  state.items = kanryo.map(it => {
    const hinmeiCode = it.hinmei || '';
    const hinmei = HINMEI_MAP[hinmeiCode] || hinmeiCode;
    return {
      checked: true,
      hinmei,
      grade: it.grade || '',
      thickness: it.thickness || '',
      width: it.width || '',
      length: it.length || '',
      irikazu: it.qty || '',
      qty: it.actual && it.actual !== '-' ? it.actual : it.planned || '',
      tanka: '',
      tanka_mod: '',
      remark: it.remark || '',
      _key: it._key
    };
  });

  // Load prices from cache (instant)
  loadPricesFromCache(cust.name, cust.method);
  state.items.forEach(it => {
    it.tanka = lookupPrice(it.hinmei, it.grade, it.thickness, it.width, it.length);
  });

  state.step = 2;
  render();
  window.scrollTo(0, 0);

  state.step = 2;
  render();
}

// =====================================================
// Render
// =====================================================
function render() {
  updateStepIndicators();
  const app = document.getElementById('app');
  if (state.step === 1) renderStep1(app);
  else if (state.step === 2) renderStep2(app);
  else if (state.step === 3) renderStep3(app);
}

function updateStepIndicators() {
  for (let i = 1; i <= 3; i++) {
    const el = document.getElementById('step-ind-' + i);
    el.className = 'step-item';
    if (i === state.step) el.classList.add('active');
    else if (i < state.step) el.classList.add('done');
  }
}

// --- Step 1 ---
function renderStep1(app) {
  const kanryoCounts = getKanryoCustomers();
  const priorityNames = Object.keys(kanryoCounts);

  app.innerHTML = `
    <div class="date-row">
      <label>日付</label>
      <input type="date" id="inp-date" value="${state.date}">
    </div>
    <input class="search-box" type="text" id="search-customer" placeholder="取引先を検索..." autocomplete="off">

    ${priorityNames.length ? `
    <div class="section-label">製造完了あり</div>
    <div class="customer-list" id="priority-list">
      ${priorityNames.map(name => {
        const cust = state.customers.find(c => matchCustomerName(c.name, name));
        const method = cust ? cust.method : '';
        return `<div class="customer-card priority" data-name="${esc(name)}" data-method="${esc(method)}" onclick="onCustomerClick(this)">
          <div class="customer-name">${esc(name)}<span class="customer-badge">${kanryoCounts[name]}件</span></div>
          <div class="customer-method">${esc(method)}</div>
        </div>`;
      }).join('')}
    </div>` : ''}

    <div class="section-label">全取引先</div>
    <div class="customer-list" id="all-list">
      ${state.customers.filter(c => !isExcluded(c.name) && c.method !== 'ネット').map(c => `
        <div class="customer-card" data-name="${esc(c.name)}" data-method="${esc(c.method)}" onclick="onCustomerClick(this)">
          <div class="customer-name">${esc(c.name)}</div>
          <div class="customer-method">${esc(c.method)}</div>
        </div>`).join('')}
    </div>
  `;

  document.getElementById('inp-date').addEventListener('change', e => { state.date = e.target.value; });
  document.getElementById('search-customer').addEventListener('input', e => {
    const q = e.target.value.toLowerCase();
    document.querySelectorAll('.customer-card').forEach(card => {
      const name = card.dataset.name.toLowerCase();
      card.style.display = name.includes(q) ? '' : 'none';
    });
  });
}

function matchCustomerName(a, b) {
  if (a === b) return true;
  if (a.includes(b) || b.includes(a)) return true;
  // 括弧等を除去して比較（例: ナイス（株）小牧 → ナイス小牧）
  const clean = s => s.replace(/[（）\(\)株有]/g, '').trim();
  const ca = clean(a), cb = clean(b);
  return ca === cb || ca.includes(cb) || cb.includes(ca);
}

function onCustomerClick(el) {
  const name = el.dataset.name;
  const method = el.dataset.method;
  const cust = state.customers.find(c => c.name === name)
    || state.customers.find(c => matchCustomerName(c.name, name))
    || { name, method, address: '' };
  selectCustomer(cust);
}

// --- Step 2 ---
function renderStep2(app) {
  const cust = state.selectedCustomer;
  const items = state.items;
  const checkedItems = items.filter(it => it.checked);
  const subtotal = checkedItems.reduce((s, it) => s + calcKingaku(it), 0);
  const tax = Math.floor(subtotal * TAX_RATE);

function updateItem(i, field, val) { state.items[i][field] = val; render(); }
function autoPrice(i) {
  const it = state.items[i];
  it.tanka = lookupPrice(it.hinmei, it.grade, it.thickness, it.width, it.length);
  render();
}
function removeItem(i) { state.items.splice(i, 1); render(); }
function addItem() {

    checked: true, hinmei: '', grade: '丸節', thickness: 15, width: 120, length: 4000,
    irikazu: 8, qty: '', tanka: '', tanka_mod: '', remark: '', _key: null

  render();
}

// =====================================================

function savePDF() {
  const el = document.getElementById('nouhinsho-preview');
  const name = state.selectedCustomer.name;
  html2pdf().set({
    margin: 0,
    filename: '納品書_' + name + '_' + state.date + '.pdf',
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  }).from(el).save();
}

// =====================================================
// Utilities
// =====================================================
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function formatDate(dateStr) {
  const d = new Date(dateStr);
  return d.getFullYear() + '年' + (d.getMonth()+1) + '月' + d.getDate() + '日';
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function init() {

}
